<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Solid Black Background -->
  <rect width="24" height="24" fill="#000000" />
  
  <!-- Window Frame -->
  <rect x="2" y="3" width="20" height="18" rx="2" ry="2" fill="#050505" stroke="#1a1a1a" stroke-width="0.5" />
  
  <g filter="url(#glow)">
    <!-- Header -->
    <path d="M2 7h20" stroke="#00f2ff" stroke-width="1" />
    <circle cx="5" cy="5" r="0.7" fill="#00f2ff" />
    <circle cx="8" cy="5" r="0.7" fill="#00f2ff" />
    
    <!-- Sidebar -->
    <path d="M7 7v14" stroke="#00f2ff" stroke-width="1" />
    <rect x="3.5" y="9" width="2" height="0.5" rx="0.2" fill="#00f2ff" opacity="0.6" />
    <rect x="3.5" y="11.5" width="2" height="0.5" rx="0.2" fill="#00f2ff" opacity="0.6" />
    <rect x="3.5" y="14" width="2" height="0.5" rx="0.2" fill="#00f2ff" opacity="0.6" />
    
    <!-- Main Content -->
    <!-- Bar Chart -->
    <rect x="9" y="15" width="2" height="4" rx="0.5" fill="#ff00ff" />
    <rect x="12" y="12" width="2" height="7" rx="0.5" fill="#00f2ff" />
    <rect x="15" y="14" width="2" height="5" rx="0.5" fill="#ff00ff" />
    
    <!-- Gauge -->
    <path d="M14 10 a 2.5 2.5 0 1 1 5 0" stroke="#00f2ff" stroke-width="0.8" fill="none" stroke-dasharray="1 1" />
    
    <!-- Lines -->
    <path d="M9 9h6" stroke="#ffffff" stroke-width="0.3" opacity="0.4" />
    <path d="M18 9h2" stroke="#ffffff" stroke-width="0.3" opacity="0.4" />
  </g>
</svg>