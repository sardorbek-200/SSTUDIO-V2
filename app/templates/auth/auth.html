{% extends "base.html" %}


{% block style %}
<style>
    .main-content {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .sign-in,
    .sign-up {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        font-size: 16px;
        cursor: pointer;
        border: none;
        outline: none;
        border-radius: 10px;
        background-color: #001A42;
        color: white;
        transition: all 0.5s ease;
        border: 1px solid #001A42;
    }

    .sign-in:hover,
    .sign-up:hover {
        background-color: transparent;
        color: aqua;
        border: 1px solid #001A42;
        border-radius: 25px;
    }
</style>
{% endblock %}

{% block content %}
<div class="main-contenet">
    <div class="glass-card">
        <h1>Kirish</h1>
        <button class="sign-in" onclick="window.location.href='/auth/sign-in'">Kirish</button>
        <button class="sign-up" onclick="window.location.href='/auth/sign-up'">Ro'yxatdan o'tish</button>
    </div>
</div>
{% endblock %}
