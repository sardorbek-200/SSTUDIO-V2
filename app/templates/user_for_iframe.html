<div class="user-card">
    <div class="user-avatar">
        <img src="{{ status.picture if status.picture else '/static/icon/dark_icon.png' }}" alt="User avatar" />
    </div>
    <div class="user-info">
        <div class="user-header">
            <div>
                <div class="user-name">{{ user.username }}</div>
                <div class="user-rank">
                    << {{ status.rank if status.rank else "USER" }} >>
                </div>
                <a class="user-connect"  href='https://salogram.studio.uz/chat/{{ user.id }}' target="_parent">
                    Bog'lanish
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .user-card {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: flex-start;
        min-width: 400px;
        width: 100%;
        max-width: 760px;
        padding: 18px;
        gap: 16px;
        background: #{{status.color if status.color else 'ffffff'}}38;
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
        font-family: Inter, system-ui, sans-serif;
    }

    .user-avatar {
        flex: 0 0 112px;
        width: 112px;
        height: 112px;
        border-radius: 24px;
        overflow: hidden;
        animation: float 5s ease-in-out infinite;
    }

    .user-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .user-info {
        flex: 1 1 240px;
        min-width: 240px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .user-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
    }

    .user-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 6px;
    }

    .user-rank {
        font-size: 2em;
        font-family: monospace;
        color: {{ status.rank_color if status.rank_color else '#111827' }};

    }
    {{ status.animation }}
</style>
